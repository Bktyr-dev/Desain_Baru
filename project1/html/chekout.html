<!DOCTYPE html>
<html>

<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/chekout.css">

    

</head>

<body>

    <div class="header">
        PINDAKI - Checkout
    </div>

    <form action="../html/orders.html">

        <div class="container">

            <div class="card">

                <h3>Data Penyewa</h3>

                <input type="text" placeholder="Nama" required>
                <input type="text" placeholder="No HP" required>
                <input type="text" placeholder="Alamat" required>

            </div>

            <div class="card summary">

                <h3>Ringkasan Pesanan</h3>

                <p>Produk : Tenda 4 Orang</p>
                <p>Durasi : 2 Hari</p>

                <p class="total">Total : Rp120.000</p>

                <button type="submit">Bayar Sekarang</button>

            </div>

        </div>

    </form>

</body>

</html>
