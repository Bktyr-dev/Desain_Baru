<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoendaQi Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar p-4 vh-100">
                <div class="brand mb-5">
                    <img src="https://via.placeholder.com/40" alt="Logo" class="rounded-circle mb-2">
                    <h3 class="fw-bold">PoendaQi</h3>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a href="../html/admin.html" class="nav-link text-white opacity-100">Beranda</a></li>
                    <li class="nav-item mb-2"><a href="../html/peminjaman.html" class="nav-link text-white opacity-75">Peminjaman</a></li>
                    <li class="nav-item mb-2"><a href="../html/profile.html" class="nav-link text-white opacity-75">Profile</a></li>
                </ul>
            </nav>

            <main class="col-md-10 main-content p-5">
                <div class="row mb-4 text-center">
                    <div class="col-md-4">
                        <div class="stat-card p-4">
                            <h6>Pengguna</h6>
                            <h1>30</h1>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card p-4">
                            <h6>Peralatan</h6>
                            <h1>30</h1>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card p-4">
                            <h6>Peminjam</h6>
                            <h1>9</h1>
                        </div>
                    </div>
                </div>

                <div class="placeholder-bar mb-4"></div>

                <button class="btn btn-add mb-4">+ Tambah stok</button>

                <div class="row g-3">
                    <div class="col-md-3">
                        <div class="item-card text-center p-3 h-100 d-flex flex-column">
                            <div class="img-container">
                                <img src="../image/jaket.webp" alt="Jaket">
                            </div>
                            <p class="small fw-bold">Jaket Windbreaker</p>
                            <button class="btn btn-detail">Detail
                            </button>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="item-card text-center p-3 h-100 d-flex flex-column">
                            <div class="img-container">
                                <img src="../image/tenda.jpg" alt="Tenda">
                            </div>
                            <p class="small fw-bold">Tenda 4 Orang</p>
                            <button class="btn btn-detail btn-sm mt-auto">Detail</button>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="item-card text-center p-3 h-100 d-flex flex-column">
                            <div class="img-container">
                                <img src="../image/Sepatu1.jpg" alt="Sepatu">
                            </div>
                            <p class="small fw-bold">Sepatu</p>
                            <button class="btn btn-detail btn-sm mt-auto">Detail</button>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="item-card text-center p-3 h-100 d-flex flex-column">
                            <div class="img-container">
                                <img src="../image/carrier.jpg" alt="Carrier">
                            </div>
                            <p class="small fw-bold">Carrier</p>
                            <button class="btn btn-detail btn-sm mt-auto">Detail</button>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    </main>
    </div>
    </div>
