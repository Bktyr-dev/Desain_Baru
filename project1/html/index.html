<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PoendaQi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-bg">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-box p-5 text-center shadow">
            <div class="mb-4">
                <img src="https://via.placeholder.com/60" alt="Logo" class="rounded-circle mb-2">
                <h3 class="fw-bold text-success">PoendaQi</h3>
            </div>

            <h5 class="mb-4 fw-semibold">Silakan Login</h5>

            <div class="mb-3">
                <input type="email" class="form-control custom-input" placeholder="Email">
            </div>
            <div class="mb-4">
                <input type="password" class="form-control custom-input" placeholder="Password">
            </div>

            <div class="d-grid gap-2 mb-4">
                <a href="../html/dashboard.html" class="btn btn-login py-2 fw-bold text-decoration-none">Login</a>
            </div>

            <p class="text-muted small">
                Belum punya akun? <a href="../html/register.html" class="text-success fw-bold text-decoration-none">Register</a>
            </p>
        </div>
    </div>

</body>
</html>
